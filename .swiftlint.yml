included:
  - Geoclock
  - GeoclockTests
  - GeoclockUITests

disabled_rules:
  - multiple_closures_with_trailing_closure  # normal in SwiftUI

opt_in_rules:
  - sorted_imports
  - explicit_init
  - first_where
  - fatal_error_message

force_try:
  severity: warning

identifier_name:
  min_length:
    warning: 2
    error: 1
